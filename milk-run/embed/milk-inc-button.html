<!-- ================================================================
     MILK RUN — knop voor de Milk Inc. homepage (milkinc.be)
     Linkt naar de arcade-game: https://popcornbrains.com/milk-run/
     Huisstijl: monochroom (wit op zwart), monospace, korte caps-CTA.
     Zelfstandig: inline styles, geen externe fonts/CSS/JS nodig.
     Plak dit HTML-blok in een donkere (zwarte) sectie van de site.
     ================================================================ -->
<div style="text-align:center; margin:2rem 0;">
  <a href="https://popcornbrains.com/milk-run/"
     target="_blank" rel="noopener"
     style="display:inline-block; padding:18px 40px;
            background:#FFFFFF; color:#000000;
            font-family:'ProtoMono','ProtoMono-Light',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
            font-size:15px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
            text-decoration:none; border:2px solid #FFFFFF; border-radius:0;
            transition:background .18s ease, color .18s ease;"
     onmouseover="this.style.background='transparent';this.style.color='#FFFFFF';"
     onmouseout="this.style.background='#FFFFFF';this.style.color='#000000';">
    Speel Milk Run &rarr;
  </a>
</div>
